{% extends "base_auth.html" %}
{% block title %}Register{% endblock %}
{% block auth_subtitle %}Create an admin account{% endblock %}

{% block auth_content %}
<form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label fw-semibold small text-muted text-uppercase" for="username">Username</label>
        <input type="text" class="form-control" name="username" id="username" required autocomplete="username">
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold small text-muted text-uppercase" for="email">Email</label>
        <input type="email" class="form-control" name="email" id="email" required autocomplete="email">
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold small text-muted text-uppercase" for="phone_number">Phone</label>
        <input type="text" class="form-control" name="phone_number" id="phone_number" required autocomplete="tel">
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold small text-muted text-uppercase" for="password1">Password</label>
        <input type="password" class="form-control" name="password1" id="password1" required autocomplete="new-password">
    </div>
    <div class="mb-4">
        <label class="form-label fw-semibold small text-muted text-uppercase" for="password2">Confirm password</label>
        <input type="password" class="form-control" name="password2" id="password2" required autocomplete="new-password">
    </div>
    <button type="submit" class="btn btn-primary w-100">Create account</button>
</form>
{% endblock %}

{% block auth_footer %}
<p class="text-center text-white-50 small mt-4 mb-0">
    Already registered?
    <a href="{% url 'saloon_admin:login' %}" class="text-white fw-semibold text-decoration-none">Sign in</a>
</p>
{% endblock %}
