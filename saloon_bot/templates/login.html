{% extends "base_auth.html" %}
{% block title %}Login{% endblock %}
{% block auth_subtitle %}Sign in to continue{% endblock %}

{% block auth_content %}
<form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label fw-semibold small text-muted text-uppercase" for="email">Email</label>
        <input type="email" class="form-control" name="email" id="email" required autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="mb-4">
        <label class="form-label fw-semibold small text-muted text-uppercase" for="password">Password</label>
        <input type="password" class="form-control" name="password" id="password" required autocomplete="current-password" placeholder="••••••••">
    </div>
    <button type="submit" class="btn btn-primary w-100">Sign in</button>
</form>
{% endblock %}

{% block auth_footer %}
<p class="text-center text-white-50 small mt-4 mb-0">
    No account?
    <a href="{% url 'saloon_admin:register' %}" class="text-white fw-semibold text-decoration-none">Create one</a>
</p>
{% endblock %}
